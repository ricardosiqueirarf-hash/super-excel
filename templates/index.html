<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Super Excel: planilha web com Flask e HyperFormula.">
  <title>Super Excel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">S</span>
      <div><strong>Super Excel</strong><small>Flask + HyperFormula</small></div>
    </div>
    <input id="workbook-name" class="workbook-name" value="Minha Planilha" maxlength="120" aria-label="Nome da planilha">
    <div class="top-actions">
      <button id="new-button" type="button">Nova</button>
      <button id="open-button" type="button">Abrir</button>
      <button id="save-button" type="button" class="primary">Salvar</button>
      <button id="functions-button" type="button">30 fórmulas</button>
    </div>
  </header>
  <main>
    <section class="toolbar" aria-label="Ferramentas da planilha">
      <button id="undo-button" type="button" title="Desfazer (Ctrl+Z)">↶</button>
      <button id="redo-button" type="button" title="Refazer (Ctrl+Y)">↷</button>
      <span class="separator"></span>
      <button id="clear-button" type="button">Limpar célula</button>
      <button id="example-button" type="button">Carregar exemplo</button>
      <span class="separator"></span>
      <button id="export-button" type="button">Exportar JSON</button>
      <label class="file-button" for="import-input">Importar JSON</label>
      <input id="import-input" type="file" accept="application/json,.json" hidden>
    </section>
    <section class="formula-row">
      <div id="cell-address" class="cell-address">A1</div>
      <div class="fx">fx</div>
      <input id="formula-input" type="text" spellcheck="false" autocomplete="off" aria-label="Barra de fórmulas" placeholder="Digite um valor ou fórmula, por exemplo: =SOMA(A1:A5)">
    </section>
    <section class="sheet-shell"><div id="spreadsheet" class="spreadsheet" role="grid" aria-label="Planilha"></div></section>
    <footer class="statusbar">
      <span id="status-message">Pronto</span><span id="selection-summary"></span><span>HyperFormula 3.3.0 · pt-BR</span>
    </footer>
  </main>
  <dialog id="functions-dialog" class="dialog functions-dialog">
    <div class="dialog-header">
      <div><h2>30 fórmulas disponíveis</h2><p>Use ponto e vírgula <code>;</code> entre argumentos.</p></div>
      <button class="icon-button" data-close-dialog="functions-dialog" aria-label="Fechar">×</button>
    </div>
    <div id="functions-list" class="functions-list"></div>
  </dialog>
  <dialog id="open-dialog" class="dialog open-dialog">
    <div class="dialog-header">
      <div><h2>Abrir planilha</h2><p>Arquivos salvos no servidor Flask.</p></div>
      <button class="icon-button" data-close-dialog="open-dialog" aria-label="Fechar">×</button>
    </div>
    <div id="workbooks-list" class="workbooks-list"></div>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/hyperformula@3.3.0/dist/hyperformula.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hyperformula@3.3.0/dist/languages/ptPT.js"></script>
  <script src="{{ url_for('static', filename='js/formula-engine.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
